# ============================================================
#  青年品质租房管理系统 - 主配置文件
#  技术栈：Spring Boot 3.5.14 + MyBatis-Plus + MySQL 8.0
# ============================================================

spring:
  application:
    name: RentManageSystem

  # ==================== 数据源配置 ====================
  datasource:
    # MySQL 8.0 连接信息（开发环境）
    url: jdbc:mysql://localhost:3306/rent_manage?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 6167569a            # ⚠️ 生产环境请使用环境变量或加密存储
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池（Spring Boot默认，性能优秀）
    hikari:
      minimum-idle: 5          # 最小空闲连接数
      maximum-pool-size: 20     # 最大连接数
      idle-timeout: 30000       # 空闲连接超时时间(ms)
      connection-timeout: 30000 # 获取连接超时时间(ms)
      max-lifetime: 1800000     # 连接最大存活时间(30分钟)

  # ==================== Jackson JSON 配置 ====================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false   # 日期不输出为时间戳
    default-property-inclusion: non_null # 空值字段不返回给前端

  # ==================== 文件上传配置 ====================
  servlet:
    multipart:
      max-file-size: 10MB       # 单个文件最大大小
      max-request-size: 50MB    # 单次请求最大大小

  # ==================== 邮件发送配置（订单通知）====================
  #  配置后自动激活 OrderEmailService（新订单通知、确认通知、取消通知、支付成功通知）
  #  常用邮箱SMTP：
  #    QQ邮箱：host=smtp.qq.com, port=465(SSL) 或 587(TLS), password=授权码
  #    163邮箱：host=smtp.163.com, port=465, password=授权码
  #    Gmail：  host=smtp.gmail.com, port=587, password=应用专用密码
  mail:
    host: smtp.qq.com
    port: 465
    username: 2147154396@qq.com
    password: rqspoxhigfwyfcjj   # ⚠️ 是授权码，不是QQ密码！
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8

# ==================== 自定义应用配置 ====================
app:
  upload:
    # 图片上传存储目录（项目根目录下的 uploads/ 文件夹）
    # 开发环境: RentManageSystem/uploads/
    # 生产环境建议改为绝对路径如: /data/rent-app/uploads/
    dir: ./uploads

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml          # Mapper XML 扫描路径
  type-aliases-package: com.rent.managesystem.entity     # 实体类别名包
  configuration:
    map-underscore-to-camel-case: true   # 下划线转驼峰（数据库 user_name → Java userName）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境打印SQL日志（生产环境请关闭！）
  global-config:
    db-config:
      id-type: assign_id           # 主键策略：雪花算法自动生成全局唯一ID
      logic-delete-field: deleted  # 逻辑删除字段名
      logic-delete-value: 1        # 已删除的值
      logic-not-delete-value: 0    # 未删除的值

# ==================== 服务端口号 ====================
server:
  port: 8080
  servlet:
    context-path: /api             # 全局URL前缀：http://localhost:8080/api/...

# ==================== Knife4j API文档配置 ====================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    # 不使用 group-configs，单项目直接扫描 controller 包即可
  packages-to-scan: com.rent.managesystem.controller

knife4j:
  enable: false                    # 关闭增强功能（springdoc 2.8.9+ 下增强功能可能不兼容）
  setting:
    language: zh_cn                # 界面语言：中文
