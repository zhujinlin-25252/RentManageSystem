# ============================================================
#  开发环境配置 (application-dev.yml)
#  使用方式: java -jar app.jar --spring.profiles.active=dev
# ============================================================

# 开发环境特点：
# - SQL日志开启（方便调试）
# - Knife4j文档启用
# - 连接本地数据库

spring:
  # 数据源 - 开发环境（连接本地MySQL）
  datasource:
    url: jdbc:mysql://localhost:3306/rent_manage?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 135200

# MyBatis-Plus - 开发环境打印SQL日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志级别 - 开发环境显示详细日志
logging:
  level:
    com.rent.managesystem: debug
    org.springframework.security: debug
